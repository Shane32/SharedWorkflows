name: Build Check

on:
  workflow_call:
    inputs:
      dotnet_folder:
        description: 'Path to the .NET project folder'
        required: false
        type: string
      spa_folder:
        description: 'Path to the SPA project folder'
        required: false
        type: string
      npm_build_script:
        description: 'NPM build script'
        required: false
        type: string
        default: 'build'
      npm_test_script:
        description: 'NPM test script'
        required: false
        type: string
        default: 'test'
      dotnet_test_settings:
        description: '.NET test settings XML file location'
        required: false
        type: string
        default: 'testsettings.xml'
      npm_lint_script:
        description: 'NPM lint script'
        required: false
        type: string
        default: 'lint'
      npm_prettier_script:
        description: 'NPM Prettier check script'
        required: false
        type: string
        default: 'prettier:check'
      global_json_folder:
        description: 'Path to the folder containing global.json'
        required: false
        type: string
        default: '.'
      dotnet_version:
        description: '.NET SDK version to use (overrides global.json when specified)'
        required: false
        type: string
      dotnet_format_severity:
        description: '.NET format severity level'
        required: false
        type: string
        default: 'error'
      format:
        description: 'Enable or disable formatting checks'
        required: false
        type: string
        default: ''
      build:
        description: 'Enable or disable build checks'
        required: false
        type: boolean
        default: true
      dotnet_build_runner:
        description: 'Runner for .NET builds'
        required: false
        type: string
        default: 'ubuntu-latest'
      coverage_alert_threshold:
        description: 'Coverage alert threshold percentage'
        required: false
        type: number
        default: 20
      coverage_warning_threshold:
        description: 'Coverage warning threshold percentage'
        required: false
        type: number
        default: 80
      nuget_accounts:
        description: 'Comma-separated list of GitHub accounts to add as NuGet sources.'
        required: false
        type: string
        default: 'default'
      npm_accounts:
        description: 'Comma-separated list of GitHub accounts to add as NPM sources.'
        required: false
        type: string
        default: 'default'
      coverage_report:
        description: 'Enable or disable coverage reports'
        required: false
        type: string
      npm_analyze_script:
        description: 'NPM analyze script to run after build'
        required: false
        type: string
      analysis_artifacts:
        description: 'Full path to files to upload as analysis artifacts (glob pattern)'
        required: false
        type: string
      data_collector:
        description: 'Data collector for dotnet test'
        required: false
        type: string
      coveralls:
        description: 'Enable Coveralls support'
        required: false
        type: boolean
        default: false

    secrets:
      NUGET_ORG_USER:
        required: false
      NUGET_ORG_TOKEN:
        required: false
      NPM_TOKEN:
        required: false
      CODECOV_TOKEN:
        required: false

jobs:
  build_net:
    name: .NET
    runs-on: ${{ inputs.dotnet_build_runner }}
    if: inputs.build && inputs.dotnet_folder
    outputs:
      run_pr_report: ${{ steps.coverage.outputs.run_pr_report }}
      has_coverage: ${{ steps.coverage.outputs.has_coverage }}
      has_codecov_token: ${{ steps.coverage.outputs.has_codecov_token }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET Core
        if: inputs.dotnet_version == ''
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: ${{ inputs.global_json_folder }}/global.json

      - name: Setup .NET Core
        if: inputs.dotnet_version != ''
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ inputs.dotnet_version }}

      - name: Add NuGet Sources
        if: inputs.nuget_accounts != ''
        uses: Shane32/SharedWorkflows/.github/actions/add-nuget-sources@2.3.0
        with:
          accounts: ${{ inputs.nuget_accounts }}
          username: ${{ secrets.NUGET_ORG_USER }}
          token: ${{ secrets.NUGET_ORG_TOKEN }}
  
      - name: Restore packages for solution
        run: dotnet restore
        working-directory: ${{ inputs.dotnet_folder }}

      - name: Build solution
        run: dotnet build --no-restore -c Debug
        working-directory: ${{ inputs.dotnet_folder }}

      - name: Check if test settings file exists
        id: check_test_settings
        shell: bash
        run: |
          if [ -n "${{ inputs.dotnet_test_settings }}" ] && [ -f "${{ inputs.dotnet_folder }}/${{ inputs.dotnet_test_settings }}" ]; then
            echo "has_test_settings=true" >> $GITHUB_OUTPUT
          elif [ -n "${{ inputs.dotnet_test_settings }}" ]; then
            echo "Creating default test settings file: ${{ inputs.dotnet_test_settings }}"
            cat > "${{ inputs.dotnet_folder }}/${{ inputs.dotnet_test_settings }}" << 'EOF'
          <?xml version="1.0" encoding="utf-8" ?>
          <RunSettings>
            <DataCollectionRunSettings>
              <DataCollectors>
                <DataCollector friendlyName="XPlat Code coverage">
                  <Configuration>
                    <Format>lcov,cobertura</Format>
                  </Configuration>
                </DataCollector>
              </DataCollectors>
            </DataCollectionRunSettings>
          </RunSettings>
          EOF
            echo "has_test_settings=true" >> $GITHUB_OUTPUT
          else
            echo "has_test_settings=false" >> $GITHUB_OUTPUT
          fi

      - name: Run tests with test settings
        if: steps.check_test_settings.outputs.has_test_settings == 'true' && inputs.data_collector != ''
        shell: bash
        run: |
          dotnet test --no-build --verbosity normal -c Debug \
            --collect:"${{ inputs.data_collector }}" \
            --settings ${{ inputs.dotnet_test_settings }} \
            --results-directory ./TestResults
        working-directory: ${{ inputs.dotnet_folder }}

      - name: Run tests with test settings (no data collector)
        if: steps.check_test_settings.outputs.has_test_settings == 'true' && inputs.data_collector == ''
        shell: bash
        run: |
          dotnet test --no-build --verbosity normal -c Debug \
            --settings ${{ inputs.dotnet_test_settings }} \
            --results-directory ./TestResults
        working-directory: ${{ inputs.dotnet_folder }}

      - name: Run tests without test settings
        if: steps.check_test_settings.outputs.has_test_settings == 'false' && inputs.data_collector != ''
        shell: bash
        run: |
          dotnet test --no-build --verbosity normal -c Debug \
            --collect:"${{ inputs.data_collector }}" \
            --results-directory ./TestResults
        working-directory: ${{ inputs.dotnet_folder }}

      - name: Run tests without test settings (no data collector)
        if: steps.check_test_settings.outputs.has_test_settings == 'false' && inputs.data_collector == ''
        shell: bash
        run: |
          dotnet test --no-build --verbosity normal -c Debug \
            --results-directory ./TestResults
        working-directory: ${{ inputs.dotnet_folder }}

      - name: Compute coverage flags
        id: coverage
        shell: bash
        run: |
          # Determine if Codecov token is available
          if [ -n "${{ secrets.CODECOV_TOKEN }}" ]; then
            has_codecov_token=true
          else
            has_codecov_token=false
          fi

          # Determine if the built-in PR coverage report should run:
          #   - coverage_report == 'true'  → yes, unless Codecov is active (Codecov produces its own report)
          #   - coverage_report == ''      → only if Codecov is not active and this is a PR
          #   - coverage_report == 'false' → never
          # Note: enabling Codecov always disables the built-in coverage_report steps,
          #       since Codecov produces its own coverage report.
          if [ "${{ inputs.coverage_report }}" = "false" ] || [ "$has_codecov_token" = "true" ]; then
            run_pr_report=false
          elif [ "${{ inputs.coverage_report }}" = "true" ] || [ "${{ github.event_name }}" = "pull_request" ]; then
            run_pr_report=true
          else
            run_pr_report=false
          fi

          # Find lcov coverage files
          if find "${{ inputs.dotnet_folder }}/TestResults" -type f -name 'coverage.info' 2>/dev/null | grep -q .; then
            has_coverage=true
            echo "Found coverage files"
          else
            has_coverage=false
            echo "No coverage.info files found"
          fi

          echo "has_codecov_token=$has_codecov_token" >> "$GITHUB_OUTPUT"
          echo "run_pr_report=$run_pr_report"         >> "$GITHUB_OUTPUT"
          echo "has_coverage=$has_coverage"           >> "$GITHUB_OUTPUT"

      - name: Upload test results artifact
        if: steps.coverage.outputs.has_coverage == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: TestResults
          path: ${{ inputs.dotnet_folder }}/TestResults

  upload_codecov:
    name: Upload to Codecov
    runs-on: ubuntu-latest
    needs: build_net
    if: needs.build_net.outputs.has_codecov_token == 'true' && needs.build_net.outputs.has_coverage == 'true'
    steps:
      - name: Download test results artifact
        uses: actions/download-artifact@v8
        with:
          name: TestResults

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  upload_coveralls:
    name: Upload to Coveralls
    runs-on: ubuntu-latest
    needs: build_net
    if: inputs.coveralls && needs.build_net.outputs.has_coverage == 'true'
    steps:
      - name: Download test results artifact
        uses: actions/download-artifact@v8
        with:
          name: TestResults

      - name: Collect coverage files
        id: collect_coverage
        shell: bash
        run: |
          files=$(find . -type f -name 'coverage.info' | tr '\n' ' ' | sed 's/ $//')
          echo "files=$files" >> "$GITHUB_OUTPUT"

      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2.3.6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          files: ${{ steps.collect_coverage.outputs.files }}

  coverage_report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: build_net
    if: needs.build_net.outputs.run_pr_report == 'true' && needs.build_net.outputs.has_coverage == 'true'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Download test results artifact
        uses: actions/download-artifact@v8
        with:
          name: TestResults
          path: TestResults

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Convert coverage report to Clover, HtmlSummary & Html format
        uses: danielpalme/ReportGenerator-GitHub-Action@5.5.10
        with:
          reports: 'TestResults/**/coverage.info'
          targetdir: coveragereport
          reporttypes: 'Clover;HtmlSummary;Html'
          tag: 'test_${{ github.run_number }}'

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Code Coverage Artifacts
          path: |
            coveragereport/Clover.xml
            coveragereport/summary.html
            coveragereport/**

      - name: Monitor coverage
        continue-on-error: true
        uses: slavcodev/coverage-monitor-action@1.10.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          coverage_path: coveragereport/Clover.xml
          threshold_alert: ${{ inputs.coverage_alert_threshold }}
          threshold_warning: ${{ inputs.coverage_warning_threshold }}

  build_spa:
    name: SPA
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: inputs.build && inputs.spa_folder
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ${{ inputs.spa_folder }}/package.json

      - name: Add NPM Sources
        if: inputs.npm_accounts != ''
        uses: Shane32/SharedWorkflows/.github/actions/add-npm-sources@2.3.0
        with:
          accounts: ${{ inputs.npm_accounts }}
          token: ${{ secrets.NPM_TOKEN }}
          folder: ${{ inputs.spa_folder }}

      - name: Install Dependencies
        run: npm ci
        working-directory: ${{ inputs.spa_folder }}

      - name: Build SPA
        run: npm run ${{ inputs.npm_build_script }}
        working-directory: ${{ inputs.spa_folder }}

      - name: Run analysis
        if: inputs.npm_analyze_script != ''
        run: npm run ${{ inputs.npm_analyze_script }}
        working-directory: ${{ inputs.spa_folder }}

      - name: Upload analysis artifacts
        if: inputs.analysis_artifacts != ''
        uses: actions/upload-artifact@v7
        with:
          name: Analysis Artifacts
          path: ${{ inputs.analysis_artifacts }}

      - name: Run tests
        if: ${{ inputs.npm_test_script != '' }}
        run: npm run ${{ inputs.npm_test_script }}
        working-directory: ${{ inputs.spa_folder }}

  format_net:
    name: .NET Formatting
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: (inputs.format == 'true' || (inputs.format == '' && github.event_name == 'pull_request')) && inputs.dotnet_folder
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: ${{ inputs.global_json_folder }}/global.json

      - name: Add NuGet Sources
        if: inputs.nuget_accounts != ''
        uses: Shane32/SharedWorkflows/.github/actions/add-nuget-sources@2.3.0
        with:
          accounts: ${{ inputs.nuget_accounts }}
          username: ${{ secrets.NUGET_ORG_USER }}
          token: ${{ secrets.NUGET_ORG_TOKEN }}
  
      - name: Restore dependencies
        run: dotnet restore
        working-directory: ${{ inputs.dotnet_folder }}

      - name: Check formatting
        run: |
          dotnet format --no-restore --verify-no-changes --severity ${{ inputs.dotnet_format_severity }} \
            --exclude **/Migrations/**
        working-directory: ${{ inputs.dotnet_folder }}

  format_spa:
    name: SPA Formatting
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: (inputs.format == 'true' || (inputs.format == '' && github.event_name == 'pull_request')) && inputs.spa_folder
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ${{ inputs.spa_folder }}/package.json

      - name: Add NPM Sources
        if: inputs.npm_accounts != ''
        uses: Shane32/SharedWorkflows/.github/actions/add-npm-sources@2.3.0
        with:
          accounts: ${{ inputs.npm_accounts }}
          token: ${{ secrets.NPM_TOKEN }}
          folder: ${{ inputs.spa_folder }}

      - name: Install Dependencies
        run: npm ci
        working-directory: ${{ inputs.spa_folder }}

      - name: Run Lint
        if: ${{ inputs.npm_lint_script != '' }}
        run: npm run ${{ inputs.npm_lint_script }}
        working-directory: ${{ inputs.spa_folder }}

      - name: Check Prettier Formatting
        if: ${{ inputs.npm_prettier_script != '' }}
        run: npm run ${{ inputs.npm_prettier_script }}
        working-directory: ${{ inputs.spa_folder }}
